services:
  # Python backend (Django)
  - type: web
    name: ledger-backend
    env: python
    buildCommand: "./render-build.sh"
    startCommand: "gunicorn ledger_backend.wsgi"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:5173,https://your-frontend-domain.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: ledger-db
          property: connectionString

# PostgreSQL database
databases:
  - name: ledger-db
    databaseName: ledger
    plan: free
